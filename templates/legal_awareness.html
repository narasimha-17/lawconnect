<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Legal Awareness | LawConnect AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f8fb;
      padding: 30px;
    }
    h1 {
      color: #1f3c88;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }
    label {
      font-weight: bold;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      margin-top: 12px;
      padding: 10px 16px;
      background: #16a085;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>📢 Legal Awareness</h1>
<p>Create and share legal awareness content for citizens.</p>

<div class="card">
  <label>Topic</label>
  <input type="text" placeholder="Eg: Women Rights, Tenant Rights">

  <label style="margin-top:10px;">Awareness Content</label>
  <textarea rows="6" placeholder="Explain the legal rights in simple language..."></textarea>

  <button>Publish Awareness Content</button>
</div>

<div class="card">
  <h3>Previously Published Topics</h3>
  <ul>
    <li>Right to Free Legal Aid</li>
    <li>Domestic Violence Act – Basics</li>
    <li>Labour Rights for Daily Wage Workers</li>
  </ul>
</div>

</body>
</html>
